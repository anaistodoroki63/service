<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertes Intervention</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh; }
header { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ef4444; }
h1 { font-size: 20px; color: #ef4444; }
.btn { background: #374151; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 8px; font-size: 14px; }
.btn:hover { background: #4b5563; }
.container { display: flex; height: calc(100vh - 60px); }
.left { width: 50%; padding: 25px; overflow-y: auto; }
.right { width: 50%; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #64748b; }
.box { background: #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
.box-title { background: #ef4444; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 15px; font-weight: bold; }
.box-title.blue { background: #3b82f6; }
.vehicule-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.vehicule-btn { background: #22c55e; color: black; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; border: 3px solid transparent; }
.vehicule-btn:hover { transform: scale(1.05); border-color: white; }
.vehicule-btn.selected { border-color: #fff; background: #16a34a; }
.vehicule-btn .icon { font-size: 24px; display: block; margin-bottom: 5px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 12px; }
.form-group select, .form-group input { width: 100%; padding: 10px 12px; border: none; border-radius: 6px; background: #374151; color: white; font-size: 13px; }
.btn-engager { width: 100%; background: #ef4444; padding: 12px; border: none; border-radius: 8px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
.btn-engager:hover { background: #dc2626; }
.btn-engager:disabled { background: #64748b; cursor: not-allowed; }
.alert-log { max-height: 200px; overflow-y: auto; }
.alert-item { background: #ef4444; padding: 12px; margin: 8px 0; border-radius: 8px; animation: flash 0.5s; }
@keyframes flash { 0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0.5; } }
.alert-item .header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
.alert-item .agents { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 5px; margin: 5px 0; font-size: 12px; }
.alert-item .details { font-size: 12px; color: #fca5a5; }
.section-title { color: #94a3b8; margin-bottom: 8px; font-size: 12px; }
.tag { display: inline-block; padding: 6px 10px; margin: 3px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.tag.green { background: #22c55e; color: black; }
.tag.orange { background: #f59e0b; color: black; }
.tag.blue { background: #3b82f6; color: white; }
.camera-text { text-align: center; font-size: 18px; }
.empty-msg { color: #64748b; font-size: 12px; }
</style>
</head>
<body>
<header>
  <div>🔵 MODULE OPS</div>
  <h1>🚨 ALERTES</h1>
  <div>
    <button class="btn" onclick="location.href='index.html'">🏠 Accueil</button>
    <button class="btn" onclick="location.href='affectations.html'">→ Affectations</button>
  </div>
</header>

<div class="container">
  <div class="left">
    <div class="box">
      <div class="box-title">🚒 Véhicules</div>
      <div class="vehicule-grid">
        <div class="vehicule-btn" onclick="selectVehicule('VSAV403', 'VSAV 403', '🚑')"><span class="icon">🚑</span>VSAV 403</div>
        <div class="vehicule-btn" onclick="selectVehicule('VSAV527', 'VSAV 527', '🚑')"><span class="icon">🚑</span>VSAV 527</div>
        <div class="vehicule-btn" onclick="selectVehicule('FPT201', 'FPT 201', '🚒')"><span class="icon">🚒</span>FPT 201</div>
        <div class="vehicule-btn" onclick="selectVehicule('EPA301', 'EPA 301', '🚛')"><span class="icon">🚛</span>EPA 301</div>
        <div class="vehicule-btn" onclick="selectVehicule('VSR101', 'VSR 101', '🚗')"><span class="icon">🚗</span>VSR 101</div>
        <div class="vehicule-btn" onclick="selectVehicule('CCF201', 'CCF 201', '🚒')"><span class="icon">🚒</span>CCF 201</div>
      </div>
    </div>

    <div class="box">
      <div class="box-title">📝 Départ</div>
      <div class="form-group">
        <label>Véhicule</label>
        <input type="text" id="selected-vehicule" placeholder="Cliquez sur un véhicule" readonly>
      </div>
      <div class="form-group" id="agents-section" style="display:none;">
        <label>Équipage</label>
        <div id="vehicule-agents"></div>
      </div>
      <div class="form-group">
        <label>Motif</label>
        <select id="motif">
          <option value="">-- Sélectionner --</option>
          <option value="Incendie">Incendie</option>
          <option value="Accident route">Accident route</option>
          <option value="Secours personne">Secours personne</option>
          <option value="Intoxication">Intoxication</option>
          <option value="Accident domestique">Accident domestique</option>
          <option value="Feu forêt">Feu forêt</option>
          <option value="Accident industriel">Accident industriel</option>
          <option value="Inondation">Inondation</option>
          <option value="Intervention technique">Intervention technique</option>
          <option value="Autre">Autre</option>
          <option value="precision">precision</option>
        </select>
      </div>
      <div class="form-group" id="autre-group" style="display:none;">
        <label>Préciser</label>
        <input type="text" id="motif-autre" placeholder="Motif">
      </div>
      <div class="form-group">
        <label>Localisation</label>
        <input type="text" id="localisation" placeholder="Adresse">
      </div>
      <button class="btn-engager" id="btn-engager" onclick="declencherAlerte()" disabled>🚨 ENGAGER</button>
    </div>

    <div class="box">
      <div class="box-title blue">👥 Service → Garde</div>
      <div id="liste-service"></div>
    </div>

    <div class="box">
      <div class="box-title">🚨 Garde</div>
      <div id="garde-liste"></div>
    </div>

    <div class="box">
      <div class="box-title">📜 Historique</div>
      <div id="alert-log"></div>
    </div>
  </div>

  <div class="right">
    <div class="camera-text">📹 Caméra<br><span style="font-size:14px;">Caserne</span></div>
  </div>
</div>

<script src="bip.js"></script>
<script>
var selectedId = null, selectedNom = null, selectedIcon = null;

function selectVehicule(id, nom, icon) {
  selectedId = id; selectedNom = nom; selectedIcon = icon;
  document.getElementById('selected-vehicule').value = icon + ' ' + nom;
  document.getElementById('btn-engager').disabled = false;
  
  var affectations = JSON.parse(localStorage.getItem("vehicule_affectations")) || {};
  var agents = affectations[id] || [];
  var container = document.getElementById('vehicule-agents');
  var agentsSection = document.getElementById('agents-section');
  
  if (agents.length > 0) {
    agentsSection.style.display = 'block';
    container.innerHTML = '';
    for (var i = 0; i < agents.length; i++) {
      var tag = document.createElement('span');
      tag.className = 'tag blue';
      tag.innerHTML = agents[i];
      container.appendChild(tag);
    }
  } else {
    agentsSection.style.display = 'block';
    container.innerHTML = '<span class="empty-msg">Aucun agent</span>';
  }
  
  var btns = document.querySelectorAll('.vehicule-btn');
  btns.forEach(function(btn) { btn.classList.remove('selected'); });
  event.target.closest('.vehicule-btn').classList.add('selected');
}

document.getElementById('motif').addEventListener('change', function() {
  document.getElementById('autre-group').style.display = this.value === 'Autre' ? 'block' : 'none';
});

function declencherAlerte() {
  if (!selectedId) { alert('Sélectionnez un véhicule'); return; }
  var motif = document.getElementById('motif').value;
  if (!motif) { alert('Sélectionnez un motif'); return; }
  if (motif === 'Autre') {
    motif = document.getElementById('motif-autre').value;
    if (!motif) { alert('Précisez le motif'); return; }
  }
  
  var localisation = document.getElementById('localisation').value || 'Non précisée';
  var affectations = JSON.parse(localStorage.getItem("vehicule_affectations")) || {};
  var agents = affectations[selectedId] || [];
  
  playBip(getVehiculeType(selectedId));
  
  var log = document.getElementById('alert-log');
  var now = new Date();
  var heure = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  var agentsHtml = agents.length > 0 ? '<div class="agents">👥 ' + agents.join(', ') + '</div>' : '<div class="agents">⚠️ Aucun agent</div>';
  
  var item = document.createElement('div');
  item.className = 'alert-item';
  item.innerHTML = '<div class="header"><span>' + selectedIcon + ' ' + selectedNom + '</span><span>' + heure + '</span></div>' + agentsHtml + '<div class="details">🚨 ' + motif + '</div><div class="details">📍 ' + localisation + '</div>';
  log.insertBefore(item, log.firstChild);
  
  document.getElementById('selected-vehicule').value = '';
  document.getElementById('motif').value = '';
  document.getElementById('motif-autre').value = '';
  document.getElementById('localisation').value = '';
  document.getElementById('autre-group').style.display = 'none';
  document.getElementById('agents-section').style.display = 'none';
  document.getElementById('btn-engager').disabled = true;
  
  var btns = document.querySelectorAll('.vehicule-btn');
  btns.forEach(function(btn) { btn.classList.remove('selected'); });
  selectedId = null; selectedNom = null; selectedIcon = null;
  
  setTimeout(function() { if (item.parentNode) item.parentNode.removeChild(item); }, 60000);
}

function chargerService() {
  var agents = JSON.parse(localStorage.getItem("agents")) || [];
  var container = document.getElementById('liste-service');
  if (agents.length === 0) { container.innerHTML = '<span class="empty-msg">Aucun agent</span>'; return; }
  container.innerHTML = '';
  for (var i = 0; i < agents.length; i++) {
    (function(nom) {
      var tag = document.createElement('span');
      tag.className = 'tag green';
      tag.innerHTML = nom;
      tag.onclick = function() { ajouterEnGarde(nom); };
      container.appendChild(tag);
    })(agents[i]);
  }
}

function ajouterEnGarde(nom) {
  var garde = JSON.parse(localStorage.getItem("garde")) || [];
  if (garde.indexOf(nom) === -1) { garde.push(nom); localStorage.setItem("garde", JSON.stringify(garde)); }
  chargerGarde();
}

function chargerGarde() {
  var garde = JSON.parse(localStorage.getItem("garde")) || [];
  var container = document.getElementById('garde-liste');
  if (garde.length === 0) { container.innerHTML = '<span class="empty-msg">Aucun agent en garde</span>'; return; }
  container.innerHTML = '';
  for (var j = 0; j < garde.length; j++) {
    (function(nom, idx) {
      var tag = document.createElement('span');
      tag.className = 'tag orange';
      tag.innerHTML = nom + ' ✕';
      tag.onclick = function() { garde.splice(idx, 1); localStorage.setItem("garde", JSON.stringify(garde)); chargerGarde(); };
      container.appendChild(tag);
    })(garde[j], j);
  }
}

chargerService();
chargerGarde();
</script>
</body>
</html>
