<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des alertes</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
header {
  background: #1e293b;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 18px;
  margin: 0;
}

.logo {
  font-weight: bold;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* LEFT PANEL */
.left {
  width: 50%;
  padding: 20px;
}

/* RIGHT PANEL (MAP) */
.right {
  width: 50%;
  background: black;
}

.right img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BUTTONS */
.btn {
  background: #3b82f6;
  border: none;
  padding: 8px 15px;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  margin: 5px 0;
}

.btn:hover {
  background: #2563eb;
}

/* ALERT LIST */
.alert-box {
  margin-top: 20px;
  background: #9ca3af;
  color: black;
  padding: 10px;
  border-radius: 5px;
}

</style>
</head>

<body>

<header>
  <div class="logo">🔵 MODULE OPS</div>
  <h1>SYSTÈME DE GESTION DES ALERTES</h1>
</header>

<div class="container">

  <!-- GAUCHE -->
  <div class="left">
    <button class="btn" onclick="history.back()">← Retour au module</button><br>
 <button class="btn" onclick="creerAlerte()">Créer une alerte</button>

   <div id="liste-alertes" class="alert-box">
  </div>
  </div>

  <!-- DROITE (CARTE) -->
  <div class="right">
    <img src="https://i.imgur.com/8Qf6R6G.jpg">
  </div>

</div>
<script>
function creerAlerte() {
  let texte = prompt("Entrer le nom de l'alerte :");

  if (!texte) return;

  let div = document.createElement("div");
  div.className = "alert-item";
  div.innerText = texte;

  // supprimer au clic
  div.onclick = function() {
    this.remove();
  };

  document.getElementById("liste-alertes").appendChild(div);
}
</script>
  
</body>
</html>
