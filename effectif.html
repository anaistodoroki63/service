<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effectif</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh; }
header { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; }
h1 { font-size: 20px; }
.btn { background: #374151; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 8px; font-size: 14px; }
.btn:hover { background: #4b5563; }
.btn-primary { background: #3b82f6; }
.btn-primary:hover { background: #2563eb; }
.container { padding: 30px; max-width: 1200px; margin: 0 auto; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
.stat-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; }
.stat-card .number { font-size: 36px; font-weight: bold; color: #3b82f6; }
.stat-card .label { font-size: 14px; color: #94a3b8; margin-top: 5px; }
.filters { display: flex; gap: 10px; margin-bottom: 25px; }
.filter-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; background: #374151; color: white; }
.filter-btn:hover, .filter-btn.active { background: #3b82f6; }
.agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.agent-card { background: #1e293b; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; transition: all 0.2s; }
.agent-card:hover { background: #334155; }
.agent-avatar { width: 50px; height: 50px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
.agent-info { flex: 1; }
.agent-nom { font-weight: bold; font-size: 16px; }
.agent-grade { color: #94a3b8; font-size: 13px; }
.agent-status { padding: 5px 10px; border-radius: 5px; font-size: 12px; }
.status-service { background: #22c55e; color: black; }
.status-garde { background: #f59e0b; color: black; }
.status-repos { background: #64748b; color: white; }
.empty { text-align: center; padding: 50px; color: #64748b; }
</style>
</head>
<body>
<header>
  <div>🔵 MODULE OPS</div>
  <h1>👥 Effectif</h1>
  <div>
    <button class="btn" onclick="location.href='index.html'">🏠 Accueil</button>
    <button class="btn btn-primary" onclick="location.href='prise-de-service.html'">📋 Prise de service</button>
  </div>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-card">
      <div class="number" id="total">0</div>
      <div class="label">Total effectif</div>
    </div>
    <div class="stat-card">
      <div class="number" id="en-service">0</div>
      <div class="label">En service</div>
    </div>
    <div class="stat-card">
      <div class="number" id="en-garde">0</div>
      <div class="label">En garde</div>
    </div>
    <div class="stat-card">
      <div class="number" id="au-repos">0</div>
      <div class="label">Au repos</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all')">Tous</button>
    <button class="filter-btn" onclick="setFilter('service')">En service</button>
    <button class="filter-btn" onclick="setFilter('garde')">En garde</button>
    <button class="filter-btn" onclick="setFilter('repos')">Au repos</button>
  </div>

  <div class="agent-grid" id="agent-list"></div>
</div>

<script>
// Comptes par défaut
var defaultUsers = [
  { username: 'admin', role: 'Administrateur' },
  { username: 'operateur', role: 'Opérateur' },
  { username: 'chef', role: 'Chef de garde' },
  { username: 'andy', role: 'Médecin en chef' },
  { username: 'rafael', role: 'ADJ' },
  { username: 'luc', role: 'Sapeur' },
  { username: 'marie', role: 'Caporal' }
];

var tousAgents = [];

function loadUsers() {
  var saved = localStorage.getItem('ops_users');
  var users;
  if (saved) {
    users = JSON.parse(saved);
  } else {
    users = defaultUsers;
    localStorage.setItem('ops_users', JSON.stringify(defaultUsers));
  }
  for (var i = 0; i < defaultUsers.length; i++) {
    var exists = false;
    for (var j = 0; j < users.length; j++) {
      if (users[j].username === defaultUsers[i].username) {
        exists = true;
        break;
      }
    }
    if (!exists) {
      users.push(defaultUsers[i]);
    }
  }
  localStorage.setItem('ops_users', JSON.stringify(users));
  tousAgents = users.map(function(u) {
    return { nom: u.username, grade: u.role };
  });
}

var currentFilter = 'all';

function setFilter(filter) {
  currentFilter = filter;
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  event.target.classList.add('active');
  afficherListe();
}

function getStatus(nom, agents, garde) {
  if (garde.indexOf(nom) !== -1) return 'garde';
  if (agents.indexOf(nom) !== -1) return 'service';
  return 'repos';
}

function getInitiales(nom) {
  return nom.substring(0, 2).toUpperCase();
}

function getStatusText(status) {
  if (status === 'service') return 'En service';
  if (status === 'garde') return 'En garde';
  return 'Au repos';
}

function afficherListe() {
  var agents = JSON.parse(localStorage.getItem("agents")) || [];
  var garde = JSON.parse(localStorage.getItem("garde")) || [];
  var container = document.getElementById('agent-list');
  
  var filtered = [];
  for (var i = 0; i < tousAgents.length; i++) {
    var a = tousAgents[i];
    var status = getStatus(a.nom, agents, garde);
    if (currentFilter === 'all' || status === currentFilter) {
      filtered.push({ agent: a, status: status });
    }
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Aucun agent trouvé</div>';
  } else {
    container.innerHTML = '';
    for (var j = 0; j < filtered.length; j++) {
      var a = filtered[j].agent;
      var status = filtered[j].status;
      var statusText = getStatusText(status);

      var card = document.createElement('div');
      card.className = 'agent-card';
      card.innerHTML = 
        '<div class="agent-avatar">' + getInitiales(a.nom) + '</div>' +
        '<div class="agent-info">' +
          '<div class="agent-nom">' + a.nom + '</div>' +
          '<div class="agent-grade">' + a.grade + '</div>' +
        '</div>' +
        '<div class="agent-status status-' + status + '">' + statusText + '</div>';
      container.appendChild(card);
    }
  }

  // Stats
  document.getElementById('total').innerHTML = tousAgents.length;
  document.getElementById('en-service').innerHTML = agents.length;
  document.getElementById('en-garde').innerHTML = garde.length;
  document.getElementById('au-repos').innerHTML = tousAgents.length - agents.length;
}

loadUsers();
afficherListe();

// Rafraîchir toutes les 2 secondes
setInterval(afficherListe, 2000);
</script>

</body>
</html>
