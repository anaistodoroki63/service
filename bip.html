<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des alertes</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.left {
  width: 50%;
  padding: 20px;
}

.right {
  width: 50%;
  background: black;
}

.right img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.btn {
  background: #3b82f6;
  padding: 8px 15px;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.alert-box {
  margin-top: 20px;
  padding: 10px;
}

.tag {
  display: inline-block;
  background: #22c55e;
  color: black;
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  cursor: pointer;
}

.tag:hover {
  background: red;
  color: white;
}
</style>
</head>

<body>

<header>
  <div>🔵 MODULE OPS</div>
  <h1>bip intervention</h1>
</header>

<div class="container">

  <!-- GAUCHE -->
  <div class="left">

    <button class="btn" onclick="history.back()">← Retour</button>

    <h3>Véhicules</h3>

    <span class="tag" onclick="declencherBip('VSAV 403')">VSAV 403</span>
    <span class="tag" onclick="declencherBip('FPT 201')">FPT 201</span>
    <span class="tag" onclick="declencherBip('VSAV 527')">VSAV 527</span>

    <div id="alerte-box" class="alert-box"></div>

  </div>

<!-- DROITE -->
  <div class="right">
    <img src="https://images.unsplash.com/photo-1592656094267-764a45160876?w=800" alt="caméra">
  </div>

</div>

<!-- SON -->
<audio id="bip" preload="auto">
  <source src="beep-01a.mp3" type="audio/mpeg">
</audio>

<script>
let audio = document.getElementById("bip");

function declencherBip(vehicule) {
  audio.currentTime = 0;
  audio.play().catch(err => {
    console.log("Erreur lecture audio:", err);
  });

  let box = document.getElementById("alerte-box");

  let msg = document.createElement("div");
  msg.style.background = "#f87171";
  msg.style.padding = "10px";
  msg.style.margin = "10px 0";
  msg.style.borderRadius = "5px";

  msg.innerText = "🚨 " + vehicule + " engagé !";

  box.prepend(msg);

  setTimeout(() => {
    msg.remove();
  }, 5000);
}
</script>

</body>
</html>
