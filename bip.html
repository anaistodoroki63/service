<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test BIP - Module OPS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
h1 { color: #ef4444; margin-bottom: 30px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 400px; }
.btn { padding: 30px 20px; border: none; border-radius: 15px; font-size: 24px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.95); }
.btn-vsav { background: #3b82f6; color: white; }
.btn-fpt { background: #ef4444; color: white; }
.btn-epa { background: #f59e0b; color: black; }
.btn-vsr { background: #22c55e; color: black; }
.btn-ccf { background: #dc2626; color: white; }
.btn-grve { background: #8b5cf6; color: white; }
.btn-vl { background: #06b6d4; color: black; }
.btn:hover { box-shadow: 0 0 20px currentColor; }
.info { margin-top: 30px; color: #64748b; font-size: 14px; }
</style>
</head>
<body>

<h1>🚨 TEST BIP</h1>

<div class="grid">
  <button class="btn btn-vsav" onclick="playBip('VSAV')">🚑<br>VSAV</button>
  <button class="btn btn-fpt" onclick="playBip('FPT')">🚒<br>FPT</button>
  <button class="btn btn-epa" onclick="playBip('EPA')">🚛<br>EPA</button>
  <button class="btn btn-vsr" onclick="playBip('VSR')">🚗<br>VSR</button>
  <button class="btn btn-ccf" onclick="playBip('CCF')">🚒<br>CCF</button>
  <button class="btn btn-grve" onclick="playBip('GRVE')">🚜<br>GRVE</button>
  <button class="btn btn-vl" onclick="playBip('VL')">🚙<br>VL</button>
  <button class="btn" style="background:#374151;color:white;" onclick="playBip('KLaxon')">🔊<br>KLaxon</button>
</div>

<div class="info">Cliquez sur un véhicule pour jouer le signal</div>

<script>
var bipCtx = null;
function playBip(vehiculeType) {
  var freq = 600, duree = 0.3;
  if (vehiculeType === 'VSAV') { freq = 1000; duree = 0.5; }
  else if (vehiculeType === 'FPT' || vehiculeType === 'CCF') { freq = 600; duree = 0.4; }
  else if (vehiculeType === 'EPA' || vehiculeType === 'GRVE') { freq = 800; duree = 0.6; }
  else if (vehiculeType === 'VSR' || vehiculeType === 'VL') { freq = 900; duree = 0.25; }
  else if (vehiculeType === 'KLaxon') { freq = 440; duree = 0.2; }
  
  if (!bipCtx) bipCtx = new (window.AudioContext || window.webkitAudioContext)();
  var osc = bipCtx.createOscillator();
  var gain = bipCtx.createGain();
  osc.connect(gain);
  gain.connect(bipCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'square';
  gain.gain.value = 0.5;
  osc.start(bipCtx.currentTime);
  osc.stop(bipCtx.currentTime + duree);
}
</script>

</body>
</html>
