<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prise de Service</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh; }
header { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; }
h1 { font-size: 20px; }
.btn { background: #374151; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 8px; font-size: 14px; }
.btn:hover { background: #4b5563; }
.btn-primary { background: #3b82f6; }
.btn-primary:hover { background: #2563eb; }
.container { padding: 30px; max-width: 900px; margin: 0 auto; }
.box { background: #1e293b; border-radius: 15px; padding: 25px; margin-bottom: 25px; }
.box-title { background: #2563eb; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
.input-group { display: flex; gap: 10px; margin-bottom: 15px; }
.input-group input { flex: 1; padding: 12px 15px; border: none; border-radius: 8px; font-size: 16px; background: #374151; color: white; }
.input-group input::placeholder { color: #9ca3af; }
.tag { display: inline-block; padding: 8px 12px; margin: 4px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.tag.green { background: #22c55e; color: black; }
.tag.red { background: #ef4444; color: white; }
.tag.blue { background: #3b82f6; color: white; }
.tag.orange { background: #f59e0b; color: black; }
.count { font-size: 14px; color: #94a3b8; font-weight: normal; }
.agents-box { min-height: 60px; padding: 10px; background: #111827; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
.empty-msg { color: #64748b; font-size: 14px; text-align: center; padding: 20px; width: 100%; }
.stats { display: flex; gap: 20px; margin-top: 20px; }
.stat { background: #374151; padding: 15px 25px; border-radius: 10px; text-align: center; }
.stat .number { font-size: 30px; font-weight: bold; color: #3b82f6; }
.stat .label { font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
<header>
  <div>🔵 MODULE OPS</div>
  <h1>📋 Prise de Service</h1>
  <div>
    <button class="btn" onclick="location.href='index.html'">🏠 Accueil</button>
    <button class="btn btn-primary" onclick="location.href='affectations.html'">→ Affectations</button>
  </div>
</header>

<div class="container">
  <div class="box">
    <div class="box-title">Ajouter un agent</div>
    <div class="input-group">
      <input type="text" id="nom" placeholder="Nom de l'agent..." onkeypress="if(event.key==='Enter') ajouter()">
      <button class="btn btn-primary" onclick="ajouter()">Ajouter</button>
    </div>
  </div>

  <div class="box">
    <div class="box-title">
      <span>🟢 Agents en service</span>
      <span class="count" id="count-service">0 agent(s)</span>
    </div>
    <div id="service-list" class="agents-box"></div>
  </div>

  <div class="box">
    <div class="box-title">
      <span>🟡 Agents en garde</span>
      <span class="count" id="count-garde">0 agent(s)</span>
    </div>
    <div id="garde-list" class="agents-box"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="number" id="total-service">0</div>
      <div class="label">En service</div>
    </div>
    <div class="stat">
      <div class="number" id="total-garde">0</div>
      <div class="label">En garde</div>
    </div>
  </div>
</div>

<script>
// Charger les données
var service = JSON.parse(localStorage.getItem("agents")) || [];
var garde = JSON.parse(localStorage.getItem("garde")) || [];

// AJOUTER
function ajouter() {
  var nom = document.getElementById("nom").value.trim();
  if (nom === "") {
    alert("Entrez un nom");
    return;
  }
  if (service.indexOf(nom) !== -1) {
    alert(nom + " est déjà en service");
    return;
  }
  if (garde.indexOf(nom) !== -1) {
    alert(nom + " est déjà en garde");
    return;
  }
  service.push(nom);
  sauvegarder();
  afficher();
  document.getElementById("nom").value = "";
  document.getElementById("nom").focus();
}

// AFFICHER
function afficher() {
  // Service
  var boxS = document.getElementById("service-list");
  boxS.innerHTML = "";
  if (service.length === 0) {
    boxS.innerHTML = '<div class="empty-msg">Aucun agent en service</div>';
  }
  for (var i = 0; i < service.length; i++) {
    var nom = service[i];
    // Supprimer
    var suppr = document.createElement("span");
    suppr.className = "tag red";
    suppr.innerHTML = nom + " ❌";
    suppr.onclick = (function(idx) {
      return function() {
        service.splice(idx, 1);
        sauvegarder();
        afficher();
      };
    })(i);
    // Vers garde
    var versGarde = document.createElement("span");
    versGarde.className = "tag orange";
    versGarde.innerHTML = nom + " → Garde";
    versGarde.onclick = (function(n) {
      return function() {
        var idx = service.indexOf(n);
        if (idx > -1) {
          service.splice(idx, 1);
          if (garde.indexOf(n) === -1) {
            garde.push(n);
          }
          sauvegarder();
          afficher();
        }
      };
    })(nom);
    boxS.appendChild(suppr);
    boxS.appendChild(versGarde);
  }
  
  // Garde
  var boxG = document.getElementById("garde-list");
  boxG.innerHTML = "";
  if (garde.length === 0) {
    boxG.innerHTML = '<div class="empty-msg">Aucun agent en garde</div>';
  }
  for (var j = 0; j < garde.length; j++) {
    var nomG = garde[j];
    // Supprimer
    var supprG = document.createElement("span");
    supprG.className = "tag red";
    supprG.innerHTML = nomG + " ❌";
    supprG.onclick = (function(idx) {
      return function() {
        garde.splice(idx, 1);
        sauvegarder();
        afficher();
      };
    })(j);
    // Vers service
    var versSvc = document.createElement("span");
    versSvc.className = "tag blue";
    versSvc.innerHTML = nomG + " → Service";
    versSvc.onclick = (function(n) {
      return function() {
        var idx = garde.indexOf(n);
        if (idx > -1) {
          garde.splice(idx, 1);
          if (service.indexOf(n) === -1) {
            service.push(n);
          }
          sauvegarder();
          afficher();
        }
      };
    })(nomG);
    boxG.appendChild(supprG);
    boxG.appendChild(versSvc);
  }
  
  // Stats
  document.getElementById("count-service").innerHTML = service.length + " agent(s)";
  document.getElementById("count-garde").innerHTML = garde.length + " agent(s)";
  document.getElementById("total-service").innerHTML = service.length;
  document.getElementById("total-garde").innerHTML = garde.length;
}

// SAUVEGARDER
function sauvegarder() {
  localStorage.setItem("agents", JSON.stringify(service));
  localStorage.setItem("garde", JSON.stringify(garde));
}

// INIT
afficher();
</script>

</body>
</html>
