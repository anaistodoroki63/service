<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prise de Service</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh; }
header { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; }
h1 { font-size: 20px; }
.btn { background: #374151; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 8px; font-size: 14px; }
.btn:hover { background: #4b5563; }
.btn-primary { background: #3b82f6; }
.btn-primary:hover { background: #2563eb; }
.container { padding: 30px; max-width: 900px; margin: 0 auto; }
.box { background: #1e293b; border-radius: 15px; padding: 25px; margin-bottom: 25px; }
.box-title { background: #2563eb; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
.input-group { display: flex; gap: 10px; margin-bottom: 15px; }
.input-group input { flex: 1; padding: 12px 15px; border: none; border-radius: 8px; font-size: 16px; background: #374151; color: white; }
.input-group input::placeholder { color: #9ca3af; }
.tag { display: inline-block; background: #22c55e; color: black; padding: 8px 12px; margin: 4px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.tag:hover { background: #ef4444; color: white; }
.tag.red { background: #ef4444; color: white; }
.tag.blue { background: #3b82f6; color: white; }
.tag.orange { background: #f59e0b; color: black; }
.count { font-size: 14px; color: #94a3b8; font-weight: normal; }
.agents-box { min-height: 60px; padding: 10px; background: #111827; border-radius: 8px; }
.agents-box:empty::after { content: "Aucun agent"; color: #64748b; }
.empty-msg { color: #64748b; font-size: 14px; text-align: center; padding: 20px; }
.stats { display: flex; gap: 20px; margin-top: 20px; }
.stat { background: #374151; padding: 15px 25px; border-radius: 10px; text-align: center; }
.stat .number { font-size: 30px; font-weight: bold; color: #3b82f6; }
.stat .label { font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
<header>
  <div>🔵 MODULE OPS</div>
  <h1>📋 Prise de Service</h1>
  <div>
    <button class="btn" onclick="location.href='index.html'">🏠 Accueil</button>
    <button class="btn btn-primary" onclick="location.href='affectations.html'">→ Affectations</button>
  </div>
</header>

<div class="container">
  <div class="box">
    <div class="box-title">Ajouter un agent</div>
    <div class="input-group">
      <input type="text" id="nom" placeholder="Nom de l'agent..." onkeypress="if(event.key==='Enter') ajouter()">
      <button class="btn btn-primary" onclick="ajouter()">Ajouter</button>
    </div>
  </div>

  <div class="box">
    <div class="box-title">
      <span>🟢 Agents en service</span>
      <span class="count" id="count-service">0 agent(s)</span>
    </div>
    <div id="service-list" class="agents-box"></div>
  </div>

  <div class="box">
    <div class="box-title">
      <span>🟡 Agents en garde</span>
      <span class="count" id="count-garde">0 agent(s)</span>
    </div>
    <div id="garde-list" class="agents-box"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="number" id="total-service">0</div>
      <div class="label">En service</div>
    </div>
    <div class="stat">
      <div class="number" id="total-garde">0</div>
      <div class="label">En garde</div>
    </div>
  </div>
</div>

<script>
// Charger les données
let service = JSON.parse(localStorage.getItem("agents")) || [];
let garde = JSON.parse(localStorage.getItem("garde")) || [];

// AJOUTER AGENT
function ajouter() {
  let nom = document.getElementById("nom").value.trim();
  if (!nom) return;

  if (service.indexOf(nom) !== -1 || garde.indexOf(nom) !== -1) {
    alert(nom + " existe déjà");
    return;
  }

  service.push(nom);
  sauvegarder();
  afficher();
  document.getElementById("nom").value = "";
  document.getElementById("nom").focus();
}

// AFFICHAGE
function afficher() {
  afficherService();
  afficherGarde();
}

// SERVICE
function afficherService() {
  let box = document.getElementById("service-list");
  box.innerHTML = "";

  if (service.length === 0) {
    box.innerHTML = '<div class="empty-msg">Aucun agent en service</div>';
  }

  service.forEach((nom, index) => {
    // Tag supprimer
    let tag = document.createElement("span");
    tag.className = "tag red";
    tag.innerText = nom + " ❌";
    tag.onclick = () => {
      service.splice(index, 1);
      sauvegarder();
      afficher();
    };

    // Bouton vers garde
    let btn = document.createElement("span");
    btn.className = "tag orange";
    btn.innerText = nom + " → Garde";
    btn.onclick = () => {
      service.splice(index, 1);
      if (garde.indexOf(nom) === -1) {
        garde.push(nom);
      }
      sauvegarder();
      afficher();
    };

    box.appendChild(tag);
    box.appendChild(btn);
  });

  document.getElementById("count-service").innerText = service.length + " agent(s)";
  document.getElementById("total-service").innerText = service.length;
}

// GARDE
function afficherGarde() {
  let box = document.getElementById("garde-list");
  box.innerHTML = "";

  if (garde.length === 0) {
    box.innerHTML = '<div class="empty-msg">Aucun agent en garde</div>';
  }

  garde.forEach((nom, index) => {
    // Tag supprimer
    let tag = document.createElement("span");
    tag.className = "tag red";
    tag.innerText = nom + " ❌";
    tag.onclick = () => {
      garde.splice(index, 1);
      sauvegarder();
      afficher();
    };

    // Bouton vers service
    let btn = document.createElement("span");
    btn.className = "tag blue";
    btn.innerText = nom + " → Service";
    btn.onclick = () => {
      garde.splice(index, 1);
      if (service.indexOf(nom) === -1) {
        service.push(nom);
      }
      sauvegarder();
      afficher();
    };

    box.appendChild(tag);
    box.appendChild(btn);
  });

  document.getElementById("count-garde").innerText = garde.length + " agent(s)";
  document.getElementById("total-garde").innerText = garde.length;
}

// SAUVEGARDER
function sauvegarder() {
  localStorage.setItem("agents", JSON.stringify(service));
  localStorage.setItem("garde", JSON.stringify(garde));
}

// INIT
afficher();
</script>

</body>
</html>
