<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Prise de service</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.left {
  width: 50%;
  padding: 20px;
}

.alert-box {
  margin-top: 20px;
  background: #9ca3af;
  color: black;
  padding: 10px;
  border-radius: 5px;
}

.btn {
  background: #3b82f6;
  border: none;
  padding: 8px 15px;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  margin: 5px 0;
}

.tag {
  display: inline-block;
  background: #22c55e;
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  cursor: pointer;
}

</style>
</head>

<body>

<header>
  <div>🔵 MODULE OPS</div>
  <h1>PRISE DE SERVICE</h1>
</header>

<div class="container">

  <div class="left">

    <button class="btn" onclick="history.back()">← Retour</button>

    <h3>Ajouter un agent</h3>
    <input type="text" id="agent" placeholder="Nom de l'agent">
    <button class="btn" onclick="ajouterService()">Prendre service</button>

    <div class="alert-box" id="service"></div>

  </div>

</div>

<script>
function ajouterService() {
  let nom = document.getElementById("agent").value;
  if (!nom) return;

  let agents = JSON.parse(localStorage.getItem("agents")) || [];
  agents.push(nom);

  localStorage.setItem("agents", JSON.stringify(agents));

  afficherAgents();
  document.getElementById("agent").value = "";
}

function afficherAgents() {
  let agents = JSON.parse(localStorage.getItem("agents")) || [];
  let container = document.getElementById("service");

  container.innerHTML = "";

  agents.forEach((nom, index) => {
    let tag = document.createElement("span");
    tag.className = "tag";
    tag.innerText = nom;

    // supprimer agent
    tag.onclick = function() {
      agents.splice(index, 1);
      localStorage.setItem("agents", JSON.stringify(agents));
      afficherAgents();
    };

    container.appendChild(tag);
  });
}

// charger au démarrage
afficherAgents();
</script>

</body>
</html>
