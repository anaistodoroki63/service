<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Comptes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh; }
header { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; }
h1 { font-size: 20px; }
.btn { background: #374151; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 8px; font-size: 14px; }
.btn:hover { background: #4b5563; }
.btn-primary { background: #3b82f6; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #ef4444; }
.btn-danger:hover { background: #dc2626; }
.btn-success { background: #22c55e; color: black; }
.btn-success:hover { background: #16a34a; }
.container { padding: 30px; max-width: 1000px; margin: 0 auto; }
.box { background: #1e293b; border-radius: 15px; padding: 25px; margin-bottom: 25px; }
.box-title { background: #2563eb; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
.input-group { margin-bottom: 15px; }
.input-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 13px; }
.input-group input, .input-group select { width: 100%; padding: 12px 15px; border: none; border-radius: 8px; background: #374151; color: white; font-size: 14px; }
.input-group input::placeholder { color: #64748b; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.user-list { display: flex; flex-direction: column; gap: 10px; }
.user-item { background: #374151; padding: 15px 20px; border-radius: 10px; display: flex; align-items: center; gap: 15px; }
.user-avatar { width: 45px; height: 45px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
.user-info { flex: 1; }
.user-name { font-weight: bold; font-size: 16px; }
.user-role { color: #94a3b8; font-size: 13px; }
.user-actions { display: flex; gap: 10px; }
.user-actions button { padding: 6px 12px; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
.modal.show { display: flex; }
.modal-content { background: #1e293b; padding: 30px; border-radius: 15px; width: 400px; }
.modal-content h3 { margin-bottom: 20px; font-size: 18px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions button { flex: 1; }
.error { background: #ef4444; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; }
.success { background: #22c55e; color: black; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; }
.total { font-size: 36px; font-weight: bold; color: #3b82f6; text-align: center; margin-bottom: 5px; }
.total-label { text-align: center; color: #94a3b8; font-size: 14px; }
</style>
</head>
<body>
<header>
  <div>🔵 MODULE OPS</div>
  <h1>🔐 Gestion des Comptes</h1>
  <div>
    <button class="btn" onclick="location.href='index.html'">🏠 Accueil</button>
    <button class="btn" onclick="location.href='effectif.html'">→ Effectif</button>
  </div>
</header>

<div class="container">
  <div class="box">
    <div class="box-title">
      <span>Utilisateurs</span>
      <button class="btn btn-success" onclick="openAddModal()">+ Ajouter</button>
    </div>
    <div class="total" id="totalUsers">0</div>
    <div class="total-label">utilisateurs</div>
  </div>

  <div class="box">
    <div class="user-list" id="userList"></div>
  </div>
</div>

<!-- MODAL AJOUTER -->
<div class="modal" id="addModal">
  <div class="modal-content">
    <h3>Ajouter un utilisateur</h3>
    <div class="error" id="addError"></div>
    <div class="input-group">
      <label>Nom d'utilisateur</label>
      <input type="text" id="addUsername" placeholder="Nom d'utilisateur">
    </div>
    <div class="input-group">
      <label>Mot de passe</label>
      <input type="password" id="addPassword" placeholder="Mot de passe">
    </div>
    <div class="input-group">
      <label>Rôle</label>
      <select id="addRole">
        <option value="Administrateur">Administrateur</option>
        <option value="Opérateur">Opérateur</option>
        <option value="Chef de garde">Chef de garde</option>
        <option value="Médecin en chef">Médecin en chef</option>
        <option value="Sapeur">Sapeur</option>
        <option value="Caporal">Caporal</option>
        <option value="Sergent">Sergent</option>
        <option value="ADJ">ADJ</option>
        <option value="CPL-C">CPL-C</option>
        <option value="CPL">CPL</option>
        <option value="SAP2">SAP2</option>
        <option value="SAP1">SAP1</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Annuler</button>
      <button class="btn btn-success" onclick="addUser()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL MODIFIER -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Modifier l'utilisateur</h3>
    <div class="error" id="editError"></div>
    <input type="hidden" id="editIndex">
    <div class="input-group">
      <label>Nom d'utilisateur</label>
      <input type="text" id="editUsername" placeholder="Nom d'utilisateur">
    </div>
    <div class="input-group">
      <label>Nouveau mot de passe (laisser vide pour ne pas changer)</label>
      <input type="password" id="editPassword" placeholder="Nouveau mot de passe">
    </div>
    <div class="input-group">
      <label>Rôle</label>
      <select id="editRole">
        <option value="Administrateur">Administrateur</option>
        <option value="Opérateur">Opérateur</option>
        <option value="Chef de garde">Chef de garde</option>
        <option value="Medecin en chef">Medecin en chef</option>
        <option value="Sapeur">Sapeur</option>
        <option value="Caporal">Caporal</option>
        <option value="Sergent">Sergent</option>
        <option value="ADJ">ADJ</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeEditModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveUser()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL SUPPRIMER -->
<div class="modal" id="deleteModal">
  <div class="modal-content">
    <h3>Supprimer l'utilisateur</h3>
    <p id="deleteMessage" style="margin-bottom: 20px; color: #94a3b8;">Êtes-vous sûr de vouloir supprimer cet utilisateur ?</p>
    <input type="hidden" id="deleteIndex">
    <div class="modal-actions">
      <button class="btn" onclick="closeDeleteModal()">Annuler</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Supprimer</button>
    </div>
  </div>
</div>

<script>
var defaultUsers = [
  { username: 'admin', password: 'admin', role: 'Administrateur', firstLogin: true },
  { username: 'operateur', password: 'operateur', role: 'Opérateur', firstLogin: true },
  { username: 'chef', password: 'chef', role: 'Chef de garde', firstLogin: true },
  { username: 'andy', password: 'andyno', role: 'Médecin en chef', firstLogin: true },
  { username: 'rafael', password: 'Rafaelneko', role: 'ADJ', firstLogin: true },
  { username: 'yassin anderson', password: 'yassin', role: 'Sapeur', firstLogin: true },
  { username: 'clement', password: 'clement', role: 'Médecin en chef', firstLogin: true },
  { username: 'ange', password: 'hernandez', role: 'Sapeur', firstLogin: true },
  { username: 'alex', password: 'delaye', role: 'Sapeur', firstLogin: true },
  { username: 'claude', password: 'durand', role: 'Sapeur', firstLogin: true },
  { username: 'sonni', password: 'handerson', role: 'Caporal', firstLogin: true },
  { username: 'alexandre', password: 'vautrin', role: 'Médecin', firstLogin: true },
];

function loadUsers() {
  var saved = localStorage.getItem('ops_users');
  if (saved) {
    return JSON.parse(saved);
  }
  localStorage.setItem('ops_users', JSON.stringify(defaultUsers));
  return defaultUsers;
}

function saveUsers(users) {
  localStorage.setItem('ops_users', JSON.stringify(users));
}

function getInitiales(nom) {
  return nom.substring(0, 2).toUpperCase();
}

function renderUsers() {
  var users = loadUsers();
  var container = document.getElementById('userList');
  document.getElementById('totalUsers').innerHTML = users.length;
  container.innerHTML = '';

  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    var item = document.createElement('div');
    item.className = 'user-item';
    item.innerHTML = 
      '<div class="user-avatar">' + getInitiales(u.username) + '</div>' +
      '<div class="user-info">' +
        '<div class="user-name">' + u.username + '</div>' +
        '<div class="user-role">' + u.role + '</div>' +
      '</div>' +
      '<div class="user-actions">' +
        '<button class="btn btn-primary" onclick="openEditModal(' + i + ')">Modifier</button>' +
        '<button class="btn btn-danger" onclick="openDeleteModal(' + i + ')">Supprimer</button>' +
      '</div>';
    container.appendChild(item);
  }
}

function openAddModal() {
  document.getElementById('addUsername').value = '';
  document.getElementById('addPassword').value = '';
  document.getElementById('addRole').value = 'Opérateur';
  document.getElementById('addError').style.display = 'none';
  document.getElementById('addModal').classList.add('show');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}

function addUser() {
  var username = document.getElementById('addUsername').value.trim().toLowerCase();
  var password = document.getElementById('addPassword').value;
  var role = document.getElementById('addRole').value;
  var error = document.getElementById('addError');

  if (!username || !password) {
    error.innerHTML = 'Veuillez remplir tous les champs';
    error.style.display = 'block';
    return;
  }

  if (password.length < 4) {
    error.innerHTML = 'Le mot de passe doit contenir au moins 4 caractères';
    error.style.display = 'block';
    return;
  }

  var users = loadUsers();

  for (var i = 0; i < users.length; i++) {
    if (users[i].username === username) {
      error.innerHTML = 'Ce nom d\'utilisateur existe déjà';
      error.style.display = 'block';
      return;
    }
  }

  users.push({ username: username, password: password, role: role, firstLogin: false });
  saveUsers(users);
  closeAddModal();
  renderUsers();
}

function openEditModal(index) {
  var users = loadUsers();
  var u = users[index];
  document.getElementById('editIndex').value = index;
  document.getElementById('editUsername').value = u.username;
  document.getElementById('editPassword').value = '';
  document.getElementById('editRole').value = u.role;
  document.getElementById('editError').style.display = 'none';
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

function saveUser() {
  var index = parseInt(document.getElementById('editIndex').value);
  var username = document.getElementById('editUsername').value.trim().toLowerCase();
  var password = document.getElementById('editPassword').value;
  var role = document.getElementById('editRole').value;
  var error = document.getElementById('editError');

  if (!username) {
    error.innerHTML = 'Le nom d\'utilisateur est requis';
    error.style.display = 'block';
    return;
  }

  var users = loadUsers();

  for (var i = 0; i < users.length; i++) {
    if (i !== index && users[i].username === username) {
      error.innerHTML = 'Ce nom d\'utilisateur existe déjà';
      error.style.display = 'block';
      return;
    }
  }

  users[index].username = username;
  users[index].role = role;
  if (password) {
    if (password.length < 4) {
      error.innerHTML = 'Le mot de passe doit contenir au moins 4 caractères';
      error.style.display = 'block';
      return;
    }
    users[index].password = password;
  }

  saveUsers(users);
  closeEditModal();
  renderUsers();
}

function openDeleteModal(index) {
  var users = loadUsers();
  document.getElementById('deleteIndex').value = index;
  document.getElementById('deleteMessage').innerHTML = 'Êtes-vous sûr de vouloir supprimer <strong>' + users[index].username + '</strong> ?';
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
}

function confirmDelete() {
  var index = parseInt(document.getElementById('deleteIndex').value);
  var users = loadUsers();
  var username = users[index].username;
  users.splice(index, 1);
  saveUsers(users);
  closeDeleteModal();
  renderUsers();
}

renderUsers();
</script>

</body>
</html>
