<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Affectations</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  display: flex;
  height: calc(100vh - 50px);
}

.sidebar {
  width: 220px;
  background: #111827;
  padding: 15px;
}

.menu a {
  display: block;
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
}

.menu a:hover {
  background: #2563eb;
}

.content {
  flex: 1;
  padding: 20px;
}

.box {
  background: #1e293b;
  margin-bottom: 20px;
}

.box-title {
  background: #2563eb;
  padding: 10px;
}

.box-content {
  padding: 15px;
}

.tag {
  display: inline-block;
  background: #22c55e;
  color: black;
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  cursor: pointer;
}

.dispo { color: #22c55e; cursor: pointer; }
.service { color: #3b82f6; cursor: pointer; }
.repos { color: red; cursor: pointer; }

</style>
</head>

<body>

<header>
  <div>🔵 MODULE OPS</div>
  <h1>AFFECTATIONS</h1>
</header>

<div class="container">

  <!-- MENU -->
  <div class="sidebar">
    <button onclick="history.back()">← Retour</button>

    <div class="menu">
      <a onclick="showSection('accueil')">Accueil</a>
      <a onclick="showSection('planning')">Planning</a>
      <a onclick="showSection('garde')">Liste de garde</a>
    </div>
  </div>

  <!-- CONTENU -->
  <div class="content">

    <!-- ACCUEIL -->
    <div id="accueil" class="section-content">

      <div class="box">
        <div class="box-title">Personnel en service</div>
        <div class="box-content" id="liste-service"></div>
      </div>

    </div>

    <!-- PLANNING -->
    <div id="planning" class="section-content" style="display:none;">
      <div class="box">
        <div class="box-title">Planning</div>
        <div class="box-content">

          <p onclick="changerEtat(this)" class="dispo">Lundi : Disponible</p>
          <p onclick="changerEtat(this)" class="service">Mardi : En service</p>
          <p onclick="changerEtat(this)" class="repos">Mercredi : Repos</p>

        </div>
      </div>
    </div>

    <!-- GARDE -->
    <div id="garde" class="section-content" style="display:none;">
      <div class="box">
        <div class="box-title">Liste de garde</div>
        <div class="box-content" id="garde-liste"></div>
      </div>
    </div>

  </div>

</div>

<script>
// navigation
function showSection(section) {
  document.querySelectorAll(".section-content").forEach(div => {
    div.style.display = "none";
  });
  document.getElementById(section).style.display = "block";
}

// planning cliquable
function changerEtat(element) {
  if (element.classList.contains("dispo")) {
    element.classList.replace("dispo", "service");
    element.innerText = element.innerText.split(":")[0] + " : En service";
  } else if (element.classList.contains("service")) {
    element.classList.replace("service", "repos");
    element.innerText = element.innerText.split(":")[0] + " : Repos";
  } else {
    element.classList.replace("repos", "dispo");
    element.innerText = element.innerText.split(":")[0] + " : Disponible";
  }
}

// charger agents depuis prise de service
function chargerAgents() {
  let data = localStorage.getItem("agents");

  if (!data) {
    console.log("Aucun agent trouvé");
    return;
  }

  let agents = JSON.parse(data);
  let container = document.getElementById("liste-service");

  container.innerHTML = "";

  agents.forEach(nom => {
    let tag = document.createElement("span");
    tag.className = "tag";
    tag.innerText = nom;

    tag.onclick = function() {
      ajouterGarde(nom);
    };

    container.appendChild(tag);
  });
}

// ajouter en garde
function ajouterGarde(nom) {
  let garde = JSON.parse(localStorage.getItem("garde")) || [];
  if (!garde.includes(nom)) {
    garde.push(nom);
    localStorage.setItem("garde", JSON.stringify(garde));
  }
  chargerGarde();
}

// afficher garde
function chargerGarde() {
  let garde = JSON.parse(localStorage.getItem("garde")) || [];
  let container = document.getElementById("garde-liste");

  container.innerHTML = "";

  garde.forEach((nom, index) => {
    let tag = document.createElement("span");
    tag.className = "tag";
    tag.innerText = nom;

    tag.onclick = function() {
      garde.splice(index, 1);
      localStorage.setItem("garde", JSON.stringify(garde));
      chargerGarde();
    };

    container.appendChild(tag);
  });
}

// chargement initial
chargerAgents();
chargerGarde();
</script>

</body>
</html>
