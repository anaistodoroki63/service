<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affectations</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh; }
header { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; }
h1 { font-size: 20px; }
.btn { background: #374151; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 8px; font-size: 14px; }
.btn:hover { background: #4b5563; }
.btn-primary { background: #3b82f6; }
.btn-primary:hover { background: #2563eb; }
.container { display: flex; min-height: calc(100vh - 60px); }
.sidebar { width: 220px; background: #111827; padding: 20px; border-right: 1px solid #374151; }
.sidebar-title { font-size: 12px; color: #64748b; margin-bottom: 10px; text-transform: uppercase; }
.menu-item { display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin: 5px 0; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.menu-item:hover { background: #1e293b; }
.menu-item.active { background: #3b82f6; }
.content { flex: 1; padding: 30px; overflow-y: auto; }
.section { display: none; }
.section.active { display: block; }
.box { background: #1e293b; border-radius: 15px; padding: 25px; margin-bottom: 25px; }
.box-title { background: #2563eb; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 16px; font-weight: bold; }
.tag { display: inline-block; padding: 8px 12px; margin: 4px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.tag.green { background: #22c55e; color: black; }
.tag.red { background: #ef4444; color: white; }
.tag.blue { background: #3b82f6; color: white; }
.tag.orange { background: #f59e0b; color: black; }
.agents-box { min-height: 50px; padding: 10px; background: #111827; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
.empty-msg { color: #64748b; font-size: 14px; padding: 20px; }
.stats-row { display: flex; gap: 20px; }
.stat { background: #374151; padding: 20px; border-radius: 10px; text-align: center; flex: 1; }
.stat .number { font-size: 36px; font-weight: bold; color: #3b82f6; }
.stat .label { font-size: 12px; color: #94a3b8; }
.vehicule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.vehicule-card { background: #374151; padding: 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
.vehicule-card:hover { background: #4b5563; }
.vehicule-card .header { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
.vehicule-card .icon { font-size: 35px; }
.vehicule-card .nom { font-size: 18px; font-weight: bold; }
.vehicule-card .count { font-size: 13px; color: #94a3b8; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
.modal.show { display: flex; }
.modal-content { background: #1e293b; padding: 30px; border-radius: 15px; width: 500px; max-height: 80vh; overflow-y: auto; }
.modal-content h3 { margin-bottom: 20px; font-size: 18px; }
.modal-close { margin-top: 20px; width: 100%; }
</style>
</head>
<body>
<header>
  <div>🔵 MODULE OPS</div>
  <h1>Affectations</h1>
  <div>
    <button class="btn" onclick="location.href='index.html'">🏠 Accueil</button>
    <button class="btn btn-primary" onclick="location.href='alertes.html'">🚨 Alertes</button>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-title">Navigation</div>
    <div class="menu-item active" onclick="showSection('accueil', this)">🏠 Accueil</div>
    <div class="menu-item" onclick="showSection('service', this)">📋 Personnel en service</div>
    <div class="menu-item" onclick="showSection('garde', this)">🚨 Liste de garde</div>
    <div class="menu-item" onclick="showSection('vehicules', this)">🚗 Affectation véhicules</div>
    <div class="menu-item" onclick="showSection('planning', this)">📅 Planning</div>
  </div>

  <div class="content">
    <div id="accueil" class="section active">
      <div class="box">
        <div class="box-title">Tableau de bord</div>
        <div class="stats-row">
          <div class="stat">
            <div class="number" id="stat-service">0</div>
            <div class="label">En service</div>
          </div>
          <div class="stat">
            <div class="number" id="stat-garde">0</div>
            <div class="label">En garde</div>
          </div>
          <div class="stat">
            <div class="number">6</div>
            <div class="label">Véhicules</div>
          </div>
        </div>
      </div>
      <div class="box">
        <div class="box-title">Actions rapides</div>
        <button class="btn btn-primary" onclick="location.href='prise-de-service.html'">📋 Prise de service</button>
        <button class="btn" onclick="location.href='alertes.html'">🚨 Déclencher alerte</button>
      </div>
    </div>

    <div id="service" class="section">
      <div class="box">
        <div class="box-title">Agents en service</div>
        <div id="liste-service" class="agents-box"></div>
      </div>
    </div>

    <div id="garde" class="section">
      <div class="box">
        <div class="box-title">Agents en garde</div>
        <div id="liste-garde" class="agents-box"></div>
      </div>
    </div>

    <div id="vehicules" class="section">
      <div class="box">
        <div class="box-title">🚗 Affecter les agents aux véhicules</div>
        <div class="vehicule-grid" id="vehicules-grid"></div>
      </div>
    </div>

    <div id="planning" class="section">
      <div class="box">
        <div class="box-title">Planning</div>
        <div id="planning-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal-affect">
  <div class="modal-content">
    <h3 id="modal-title">Véhicule</h3>
    <div id="modal-content"></div>
    <button class="btn modal-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

<script>
var vehicules = [
  { id: 'VSAV403', nom: 'VSAV 403', type: '🚑' },
  { id: 'VSAV527', nom: 'VSAV 527', type: '🚑' },
  { id: 'FPT201', nom: 'FPT 201', type: '🚒' },
  { id: 'EPA301', nom: 'EPA 301', type: '🚛' },
  { id: 'VSR101', nom: 'VSR 101', type: '🚗' },
  { id: 'CCF201', nom: 'CCF 201', type: '🚒' }
];

var jours = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'];

function showSection(section, el) {
  var sections = document.querySelectorAll('.section');
  var items = document.querySelectorAll('.menu-item');
  for (var i = 0; i < sections.length; i++) {
    sections[i].classList.remove('active');
    items[i].classList.remove('active');
  }
  document.getElementById(section).classList.add('active');
  el.classList.add('active');
  
  if (section === 'service') chargerService();
  if (section === 'garde') chargerGarde();
  if (section === 'vehicules') chargerVehicules();
}

function chargerService() {
  var agents = JSON.parse(localStorage.getItem("agents")) || [];
  var garde = JSON.parse(localStorage.getItem("garde")) || [];
  var box = document.getElementById("liste-service");
  box.innerHTML = "";
  
  if (agents.length === 0) {
    box.innerHTML = '<div class="empty-msg">Aucun agent en service <a href="prise-de-service.html" style="color:#3b82f6;">Ajouter</a></div>';
    return;
  }
  
  for (var i = 0; i < agents.length; i++) {
    var nom = agents[i];
    var tag = document.createElement("span");
    tag.className = "tag green";
    tag.innerHTML = nom;
    tag.onclick = (function(n) {
      return function() {
        var g = JSON.parse(localStorage.getItem("garde")) || [];
        if (g.indexOf(n) === -1) {
          g.push(n);
          localStorage.setItem("garde", JSON.stringify(g));
          chargerGarde();
          chargerService();
        }
      };
    })(nom);
    box.appendChild(tag);
  }
}

function chargerGarde() {
  var garde = JSON.parse(localStorage.getItem("garde")) || [];
  var box = document.getElementById("liste-garde");
  box.innerHTML = "";
  
  if (garde.length === 0) {
    box.innerHTML = '<div class="empty-msg">Aucun agent en garde</div>';
  }
  
  for (var j = 0; j < garde.length; j++) {
    var nom = garde[j];
    var tag = document.createElement("span");
    tag.className = "tag orange";
    tag.innerHTML = nom + " ✕";
    tag.onclick = (function(idx) {
      return function() {
        garde.splice(idx, 1);
        localStorage.setItem("garde", JSON.stringify(garde));
        chargerGarde();
        chargerService();
      };
    })(j);
    box.appendChild(tag);
  }
}

function chargerVehicules() {
  var affectations = JSON.parse(localStorage.getItem("vehicule_affectations")) || {};
  var container = document.getElementById("vehicules-grid");
  container.innerHTML = "";
  
  for (var i = 0; i < vehicules.length; i++) {
    var v = vehicules[i];
    var affects = affectations[v.id] || [];
    
    (function(vId, vNom, vType) {
      var card = document.createElement("div");
      card.className = "vehicule-card";
      card.innerHTML = 
        '<div class="header">' +
          '<span class="icon">' + vType + '</span>' +
          '<span class="nom">' + vNom + '</span>' +
        '</div>' +
        '<div class="count">' + affects.length + ' agent(s)</div>';
      card.onclick = function() { openModal(vId, vNom, vType); };
      container.appendChild(card);
    })(v.id, v.nom, v.type);
  }
}

function openModal(vId, vNom, vType) {
  document.getElementById('modal-title').innerHTML = vType + ' ' + vNom;
  
  var agents = JSON.parse(localStorage.getItem("agents")) || [];
  var affectations = JSON.parse(localStorage.getItem("vehicule_affectations")) || {};
  var affects = affectations[vId] || [];
  
  var content = '<h4 style="margin:15px 0 10px;color:#94a3b8;">Agents disponibles</h4>';
  content += '<div class="agents-box" id="modal-dispos">';
  
  for (var i = 0; i < agents.length; i++) {
    var nom = agents[i];
    var isAssigned = affects.indexOf(nom) !== -1;
    if (!isAssigned) {
      content += '<span class="tag blue" onclick="toggleAgent(\'' + vId + '\', \'' + nom + '\')">' + nom + '</span>';
    }
  }
  content += '</div>';
  
  content += '<h4 style="margin:15px 0 10px;color:#94a3b8;">Agents affectés</h4>';
  content += '<div class="agents-box" id="modal-affectes">';
  
  for (var j = 0; j < affects.length; j++) {
    content += '<span class="tag orange" onclick="toggleAgent(\'' + vId + '\', \'' + affects[j] + '\')">' + affects[j] + ' ✕</span>';
  }
  content += '</div>';
  
  document.getElementById('modal-content').innerHTML = content;
  document.getElementById('modal-affect').classList.add('show');
}

function toggleAgent(vId, nom) {
  var affectations = JSON.parse(localStorage.getItem("vehicule_affectations")) || {};
  var affects = affectations[vId] || [];
  
  var idx = affects.indexOf(nom);
  if (idx === -1) {
    affects.push(nom);
  } else {
    affects.splice(idx, 1);
  }
  
  affectations[vId] = affects;
  localStorage.setItem("vehicule_affectations", JSON.stringify(affectations));
  
  var v = vehicules.find(function(x) { return x.id === vId; });
  openModal(vId, v.nom, v.type);
  chargerVehicules();
}

function closeModal() {
  document.getElementById('modal-affect').classList.remove('show');
  chargerVehicules();
}

function chargerPlanning() {
  var container = document.getElementById("planning-list");
  container.innerHTML = "";
  
  for (var i = 0; i < jours.length; i++) {
    (function(jour, idx) {
      var status = localStorage.getItem("planning_" + idx) || "dispo";
      var icon = status === "dispo" ? "🟢" : status === "service" ? "🔵" : "🔴";
      var text = status === "dispo" ? "Disponible" : status === "service" ? "En service" : "Repos";
      
      var div = document.createElement("div");
      div.style.cssText = "padding:15px;margin:10px 0;border-radius:8px;cursor:pointer;background:" + 
        (status === "dispo" ? "#064e3b" : status === "service" ? "#1e3a8a" : "#7f1d1d") +
        ";border-left:4px solid " + (status === "dispo" ? "#22c55e" : status === "service" ? "#3b82f6" : "#ef4444");
      div.innerHTML = '<span>' + jour + '</span><span>' + icon + ' ' + text + '</span>';
      div.onclick = function() {
        var next = status === "dispo" ? "service" : status === "service" ? "repos" : "dispo";
        localStorage.setItem("planning_" + idx, next);
        chargerPlanning();
      };
      container.appendChild(div);
    })(jours[i], i);
  }
}

function majStats() {
  var agents = JSON.parse(localStorage.getItem("agents")) || [];
  var garde = JSON.parse(localStorage.getItem("garde")) || [];
  document.getElementById("stat-service").innerHTML = agents.length;
  document.getElementById("stat-garde").innerHTML = garde.length;
}

chargerService();
chargerGarde();
chargerVehicules();
chargerPlanning();
majStats();
</script>

</body>
</html>
