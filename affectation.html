<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Affectations</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  display: flex;
  height: calc(100vh - 50px);
}

.sidebar {
  width: 220px;
  background: #111827;
  padding: 15px;
}

.menu a {
  display: block;
  padding: 10px;
  color: white;
  text-decoration: none;
  margin: 5px 0;
  border-radius: 5px;
  cursor: pointer;
}

.menu a:hover {
  background: #2563eb;
}

.content {
  flex: 1;
  padding: 20px;
}

.box {
  background: #1e293b;
  margin-bottom: 20px;
  border-radius: 5px;
  overflow: hidden;
}

.box-title {
  background: #2563eb;
  padding: 10px;
  font-weight: bold;
}

.box-content {
  padding: 15px;
}

.tag {
  display: inline-block;
  background: #22c55e;
  color: black;
  padding: 8px 12px;
  margin: 5px;
  border-radius: 5px;
  cursor: pointer;
}

.tag:hover {
  background: red;
  color: white;
}

input {
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px 15px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #2563eb;
}

</style>
</head>

<body>

<header>
  <div>🔵 MODULE OPS</div>
  <h1>AFFECTATIONS</h1>
</header>

<div class="container">

  <!-- ACCUEIL -->
<div id="accueil" class="section-content">
  <h3>Ajouter un personnel</h3>
  <input type="text" id="nom" placeholder="Nom">
  <button onclick="ajouter()">Ajouter</button>

  <div class="box">
    <div class="box-title">Personnel disponible</div>
    <div class="box-content" id="liste"></div>
  </div>
</div>

<!-- PLANNING -->
<div id="planning" class="section-content" style="display:none;">
  <h3>Planning</h3>
  <div class="box">
    <div class="box-title">Planning de la semaine</div>
    <div class="box-content">
      <p>Lundi : Disponible</p>
      <p>Mardi : En service</p>
      <p>Mercredi : Repos</p>
    </div>
  </div>
</div>

<!-- LISTE DE GARDE -->
<div id="garde" class="section-content" style="display:none;">
  <h3>Liste de garde</h3>
  <div class="box">
    <div class="box-title">Agents en garde</div>
    <div class="box-content" id="garde-liste">
      <span class="tag">Agent 1</span>
      <span class="tag">Agent 2</span>
    </div>
  </div>
</div>
  
  <!-- MENU -->
  <div class="sidebar">
    <button onclick="history.back()">← Retour</button>

<div class="menu">
  <a onclick="showSection('accueil')">Accueil</a>
  <a onclick="showSection('planning')">Planning</a>
  <a onclick="showSection('garde')">Liste de garde</a>
</div>

  <!-- CONTENU -->
  <div class="content">

    <!-- AJOUT PERSONNEL -->
    <h3>Ajouter un personnel</h3>
    <input type="text" id="nom" placeholder="Nom">
    <button onclick="ajouter()">Ajouter</button>

    <!-- LISTE -->
    <div class="box">
      <div class="box-title">Personnel disponible</div>
      <div class="box-content" id="liste">
        <!-- personnes ici -->
      </div>
    </div>

  </div>

</div>

  <script>
function showSection(section) {
  document.querySelectorAll(".section-content").forEach(div => {
    div.style.display = "none";
  });

  document.getElementById(section).style.display = "block";
}
</script>
  
<script>
function ajouter() {
  let nom = document.getElementById("nom").value;

  if (nom === "") return;

  let tag = document.createElement("span");
  tag.className = "tag";
  tag.innerText = nom;

  // SUPPRIMER AU CLIC
  tag.onclick = function() {
    this.remove();
  };

  document.getElementById("liste").appendChild(tag);
  document.getElementById("nom").value = "";
}
</script>

</body>
</html>
